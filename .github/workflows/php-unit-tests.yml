name: PHP unit tests

on:
  push:
    branches:
      - master
      - 2.x
    paths:
      - '**workflows/php-unit-tests.yml'
      - '**.php'
      - '**composer.*'
      - '**phpunit.xml'
  pull_request:
    branches:
      - master
      - 2.x
    paths:
      - '**workflows/php-unit-tests.yml'
      - '**.php'
      - '**composer.*'
      - '**phpunit.xml'
    types:
      - opened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # =============================================================================
  # Detect PHP versions from composer.json
  # =============================================================================
  php-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      versions: ${{ steps.versions.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: versions
        uses: WyriHaximus/github-action-composer-php-versions-in-range@c066c91df855ca2563dc4ec46ac6674e0752ae65 # v2.0.0
        with:
          upcomingReleases: true

  # =============================================================================
  # Compatibility tests: PHP versions x WP versions
  # =============================================================================
  php-unit-tests:
    needs: php-versions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJson(needs.php-versions.outputs.versions) }}
        wp: ['latest']
        dependency-version: ['highest', 'lowest']
        experimental: [false]
        coverage: [false]
        include:
          # Oldest supported WP with lowest deps
          - php: '8.2'
            wp: '6.3'
            dependency-version: 'lowest'
            experimental: false
            coverage: false
          # Coverage: PHP 8.2, WP latest, highest deps
          - php: '8.2'
            wp: 'latest'
            dependency-version: 'highest'
            experimental: false
            coverage: true
          # Trunk (experimental)
          - php: '8.5'
            wp: 'trunk'
            dependency-version: 'highest'
            experimental: true
            coverage: false

    name: PHP ${{ matrix.php }} | WP ${{ matrix.wp }} | ${{ matrix.dependency-version }}${{ matrix.coverage && ' | coverage' || '' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ matrix.coverage && 'pcov' || 'none' }}
          tools: composer:v2
          extensions: curl, date, dom, iconv, json, libxml, gd, sqlite3
          ini-values: ${{ matrix.coverage && 'pcov.directory=src' || '' }}

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Disable insecure-package block (TMP)
        run: composer config audit.block-insecure false

      - uses: ramsey/composer-install@5c2bcf28d7b060ef3c601d7b476d5430a7b46c27 # v4
        with:
          dependency-versions: ${{ matrix.dependency-version }}

      # PHP 8.5: Collision and curl have deprecations we can't fix
      - name: Disable failOnDeprecation for PHP 8.5
        if: matrix.experimental
        run: sed -i 's/failOnDeprecation="true"/failOnDeprecation="false"/' phpunit.xml

      - name: Create coverage directory
        if: matrix.coverage
        run: mkdir -p build/logs

      - name: Run default testsuite
        run: composer test ${{ matrix.coverage && '-- --coverage-php build/coverage-default.cov' || '' }}
        env:
          WP_VERSION: ${{ matrix.wp }}

      - name: Run multisite testsuite
        run: composer test:multisite ${{ matrix.coverage && '-- --coverage-php build/coverage-multisite.cov' || '' }}
        env:
          WP_VERSION: ${{ matrix.wp }}

      - name: Run ACF integration testsuite
        run: composer test:acf ${{ matrix.coverage && '-- --coverage-php build/coverage-acf.cov' || '' }}
        env:
          WP_VERSION: ${{ matrix.wp }}

      - name: Run Co-Authors Plus integration testsuite
        run: composer test:coauthors ${{ matrix.coverage && '-- --coverage-php build/coverage-coauthors.cov' || '' }}
        env:
          WP_VERSION: ${{ matrix.wp }}

      - name: Run WPML integration testsuite
        run: composer test:wpml ${{ matrix.coverage && '-- --coverage-php build/coverage-wpml.cov' || '' }}
        env:
          WP_VERSION: ${{ matrix.wp }}

      - name: Merge coverage
        if: matrix.coverage
        run: |
          echo "Coverage files generated:"
          ls -la build/*.cov || echo "No .cov files found"
          composer require --dev phpunit/phpcov --quiet
          vendor/bin/phpcov merge build --clover build/logs/clover.xml

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: build/logs/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Coveralls
        if: matrix.coverage
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          file: build/logs/clover.xml
          github-token: ${{ secrets.GITHUB_TOKEN }}
